<!DOCTYPE html>
<html>
<head>
    <title>ShopEase Registration</title>
    <link rel="stylesheet" href="style4.css">
</head>

<body>

<div class="form-container">
<h2>ShopEase Customer Registration</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter email" required>

<label>Username</label>
<input type="text" placeholder="Choose username">

<label>Password</label>
<input type="password" placeholder="Enter password">

<!-- Dropdown -->
<label>Country</label>
<select>
<option>Select Country</option>
<option>Eswatini</option>
<option>South Africa</option>
<option>Lesotho</option>
<option>Botswana</option>
</select>

<!-- Checkboxes -->
<label>Shopping Interests</label><br>

<input type="checkbox"> Clothing<br>
<input type="checkbox"> Electronics<br>
<input type="checkbox"> Shoes<br>
<input type="checkbox"> Accessories<br>

<br>

<button type="submit">Register</button>

<p>Already have an account?
<a href="login.html">Login here</a></p>

</form>
</div>

</body>
</html>
